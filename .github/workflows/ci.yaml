name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: jamesduxbury

jobs:
  check:
    # serialise runs so concurrent suites never share the neon dev branch
    concurrency:
      group: neon-dev-db
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jamesduxbury/package-lock.json

      - name: Cache node_modules
        id: modules-cache
        uses: actions/cache@v4
        with:
          path: jamesduxbury/node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('jamesduxbury/package-lock.json') }}

      - name: Install dependencies
        if: steps.modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          # dummy values, no real oauth flow runs in ci
          GITHUB_ID: ci-dummy
          GITHUB_SECRET: ci-dummy
          AUTH_SECRET: ci-dummy-secret-for-build-only

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: jamesduxbury/coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: jamesduxbury/coverage/junit.xml

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
          GITHUB_ID: ci-dummy
          GITHUB_SECRET: ci-dummy
          AUTH_SECRET: ci-dummy-secret-for-build-only
